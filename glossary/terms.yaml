version: 1
terms:
  - id: authoritative-artifact
    canonical: authoritative artifact
    definition: >-
      A checked-in file whose contents define the current implemented contract
      or standing workflow for the repository.
    kind: governance
    discouraged:
      - source of truth file
      - canonical doc file
    applies_to:
      - README.md
      - spec/README.md
      - docs/context-system/README.md
    related_terms:
      - derived-artifact
      - active-task-packet
      - locked-subsystem
      - upstream-parity-contract
  - id: derived-artifact
    canonical: derived artifact
    definition: >-
      A generated file regenerated from authoritative source files and not
      edited by hand.
    kind: governance
    discouraged:
      - generated source of truth
      - editable generated file
    applies_to:
      - glossary/README.md
      - spec/generated/repo-map.json
      - spec/generated/subsystem-graph.mmd
    related_terms:
      - authoritative-artifact
  - id: active-task-packet
    canonical: active task packet
    definition: >-
      The repo-local task brief that records the task summary, matched
      subsystems, required reads, glossary terms, and locked-subsystem status
      for current work.
    kind: workflow
    discouraged:
      - scratch task note
      - prompt memo
    applies_to:
      - AGENTS.md
      - docs/context-system/README.md
      - scripts/context-system/task.mjs
    related_terms:
      - authoritative-artifact
      - locked-subsystem
  - id: locked-subsystem
    canonical: locked subsystem
    definition: >-
      A subsystem marked as fail-closed so edits require explicit task
      allow-listing plus authoritative record updates.
    kind: workflow
    discouraged:
      - protected area
      - sensitive module
    applies_to:
      - AGENTS.md
      - docs/context-system/README.md
      - spec/decisions/ADR-0002-locked-subsystem-edit-policy.md
    related_terms:
      - active-task-packet
      - authoritative-artifact
  - id: public-api
    canonical: public API
    definition: >-
      The exported package surface that downstream consumers import instead of
      reaching into internal implementation paths.
    kind: architecture
    discouraged:
      - external entry layer
      - consumer surface area
    applies_to:
      - src/index.ts
      - package.json
      - spec/subsystems/public-api-and-build-contract.yaml
    related_terms:
      - locked-subsystem
      - runtime-core
  - id: runtime-core
    canonical: runtime core
    definition: >-
      The host-agnostic compiler, runtime, stdlib, and value-model
      implementation under src/core.
    kind: architecture
    discouraged:
      - engine internals
      - shared runtime layer
    applies_to:
      - src/core
      - docs/runtime.md
      - spec/subsystems/runtime-core.yaml
    related_terms:
      - public-api
      - upstream-parity-contract
  - id: upstream-parity-contract
    canonical: upstream parity contract
    definition: >-
      The vendored Rust-generated bundle under upstream/ranty that defines the
      current upstream core surface and parity inputs for Ranty.js.
    kind: architecture
    discouraged:
      - synced snapshot
      - upstream dump
    applies_to:
      - upstream/ranty/contract.json
      - scripts/upstream/sync-ranty.mjs
      - spec/subsystems/upstream-parity-contract.yaml
    related_terms:
      - parity-lock
      - authoritative-artifact
      - runtime-core
  - id: parity-lock
    canonical: parity lock
    definition: >-
      The deterministic lock file that pins the exact upstream Rust commit and
      contract hash currently vendored into this repository.
    kind: workflow
    discouraged:
      - sync stamp
      - upstream marker
    applies_to:
      - upstream/ranty/lock.json
      - scripts/upstream/check-freshness.mjs
      - spec/decisions/ADR-0003-rust-upstream-authority.md
    related_terms:
      - upstream-parity-contract
      - locked-subsystem
examples:
  - term: authoritative-artifact
    examples:
      - spec/README.md
      - spec/subsystems/public-api-and-build-contract.yaml
  - term: derived-artifact
    examples:
      - glossary/README.md
      - spec/generated/repo-map.json
  - term: active-task-packet
    examples:
      - .agent-context/active-task.md
  - term: public-api
    examples:
      - src/index.ts
      - package.json exports
  - term: runtime-core
    examples:
      - src/core/ranty.ts
      - src/core/runtime/vm.ts
  - term: upstream-parity-contract
    examples:
      - upstream/ranty/contract.json
      - upstream/ranty/tests/corpus/fixtures.json
  - term: parity-lock
    examples:
      - upstream/ranty/lock.json
usage_rules:
  - Use authoritative artifact when referring to checked-in files that define current behavior or workflow.
  - Use derived artifact when referring to files regenerated by tooling instead of edited directly.
  - Use active task packet for the repo-local task brief under .agent-context.
  - Use public API for exported package surfaces that consumers import.
  - Use runtime core for the host-agnostic implementation under src/core.
  - Use upstream parity contract for the vendored Rust-generated parity bundle under upstream/ranty.
  - Use parity lock for upstream/ranty/lock.json and related freshness policy.
cross_references:
  - ../spec/README.md
  - ../docs/context-system/README.md
  - ../spec/subsystems/upstream-parity-contract.yaml
