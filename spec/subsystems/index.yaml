version: 1
status_vocabulary:
  locked: >-
    Behavior and contract-sensitive architecture. Changes require an active
    task allow-list entry and an ADR or ADR update in the same change.
  stable: >-
    Mature subsystem with explicit invariants. Changes still require subsystem
    record updates when owned code changes.
  evolving: >-
    Subsystem with active iteration. Behavior may expand, but the subsystem
    record remains authoritative for boundaries and dependencies.
source_roots:
  - .github
  - .gitignore
  - .nvmrc
  - .prettierignore
  - .prettierrc.json
  - AGENTS.md
  - LICENSE
  - README.md
  - benchmarks
  - docs
  - eslint.config.mjs
  - glossary
  - package-lock.json
  - package.json
  - rollup.config.mjs
  - scripts
  - spec
  - src
  - tests
  - tsconfig.build.json
  - tsconfig.json
  - upstream
  - vitest.config.ts
generated_roots:
  - spec/generated
allowed_local_outputs:
  - .agent-context
exempt_paths:
  - notes.md
architecture_rules:
  - id: arch-001
    from:
      - src/core/**
    forbidden:
      - src/hosts/**
      - src/index.ts
    allowed: []
    message: >-
      The runtime core stays host-agnostic and does not depend on host adapters
      or the root barrel.
  - id: arch-002
    from:
      - src/hosts/**
    forbidden:
      - src/index.ts
    allowed:
      - src/core/**
    message: >-
      Host integrations depend on core modules directly instead of importing
      through the root barrel.
task_state_path: .agent-context/active-task.json
task_markdown_path: .agent-context/active-task.md
review_packet_path: .agent-context/drift-review.md
