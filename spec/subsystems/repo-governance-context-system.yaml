id: repo-governance-context-system
title: Repo governance and anti-drift context system
status: stable
summary: >-
  Owns repository-wide workflow rules, top-level documentation routing,
  anti-drift tooling, generated context artifacts, and contributor-facing maps
  that explain how to use them.
owned_paths:
  - .github/**
  - .gitignore
  - .prettierignore
  - .prettierrc.json
  - AGENTS.md
  - LICENSE
  - README.md
  - docs/README.md
  - docs/context-system/**
  - docs/repo-workflow/**
  - glossary/**
  - scripts/context-system/**
  - scripts/check-eslint-directives.mjs
  - scripts/__tests__/contextSystem.test.js
  - spec/README.md
  - spec/tooling-and-quality.md
  - spec/comment-style.md
  - spec/testing-style.md
  - spec/decisions/ADR-0001-anti-drift-context-system.md
  - spec/decisions/ADR-0002-locked-subsystem-edit-policy.md
  - spec/generated/**
  - spec/subsystems/index.yaml
  - spec/subsystems/repo-governance-context-system.yaml
  - notes.md
related_paths:
  - spec/decisions/ADR-0003-rust-upstream-authority.md
entrypoints:
  - path: scripts/context-system/build.mjs
    symbols:
      - buildContextArtifacts
  - path: scripts/context-system/task.mjs
    symbols:
      - writeActiveTask
  - path: scripts/context-system/check.mjs
    symbols:
      - checkContextState
depends_on:
  - public-api-and-build-contract
  - runtime-core
  - host-integrations
  - upstream-parity-contract
used_by: []
required_reads:
  spec:
    - spec/README.md
    - spec/tooling-and-quality.md
  docs:
    - docs/context-system/README.md
    - docs/repo-workflow/README.md
  decisions:
    - spec/decisions/ADR-0001-anti-drift-context-system.md
    - spec/decisions/ADR-0002-locked-subsystem-edit-policy.md
glossary_terms:
  - authoritative artifact
  - derived artifact
  - active task packet
  - locked subsystem
public_contracts:
  - name: top-level project docs
    summary: README.md is the local Ranty.js product-doc entrypoint, while docs/README.md routes readers to workflow guides and the hosted shared reference.
  - name: "npm run context:build"
    summary: Regenerates tracked context artifacts from glossary, subsystem, and ADR source files.
  - name: 'npm run context:task -- "<task>"'
    summary: Writes the repo-local active task packet and prints a bounded task brief.
  - name: "npm run context:check"
    summary: Fails when task coverage, subsystem ownership, or derived context artifacts drift.
invariants:
  - id: gov-ctx-001
    statement: AGENTS.md stays intentionally thin and routes readers to authoritative artifacts.
  - id: gov-ctx-002
    statement: Context build output is derived and must be regenerated from structured source files.
  - id: gov-ctx-003
    statement: Local verification remains authoritative and npm run verify is never weakened.
  - id: gov-ctx-004
    statement: Every first-party file listed by the subsystem index must be owned by at least one subsystem.
  - id: gov-ctx-005
    statement: README.md stays the local Ranty.js product-doc entrypoint and docs/README.md stays a thin router to hosted shared docs plus local workflow guides.
performance_constraints:
  - Context artifacts stay compact enough for task briefing without requiring broad repo reads.
change_policy:
  default: additive-with-validation
  requires_adr:
    - changing active task enforcement semantics
    - moving authoritative artifact homes
tests:
  - scripts/__tests__/contextSystem.test.js
decision_refs:
  - ADR-0001
  - ADR-0002
history_anchors:
  introduced_by: 2026-03-20-ranty-js-repo-split
  major_refactors: []
