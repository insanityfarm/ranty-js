id: public-api-and-build-contract
title: Public API and build contract
status: locked
summary: >-
  Owns the exported package surface, published package metadata, build
  configuration, and public entrypoints consumers load.
owned_paths:
  - .nvmrc
  - package-lock.json
  - package.json
  - rollup.config.mjs
  - tsconfig.build.json
  - tsconfig.json
  - vitest.config.ts
  - eslint.config.mjs
  - docs/README.md
  - docs/intro.md
  - src/index.ts
  - spec/subsystems/public-api-and-build-contract.yaml
related_paths:
  - src/core/**
  - src/hosts/**
entrypoints:
  - path: src/index.ts
    symbols:
      - Ranty
      - RantyProgram
      - RantyInt
      - RantyRng
      - DefaultModuleResolver
      - VirtualModuleResolver
depends_on:
  - runtime-core
  - host-integrations
used_by:
  - repo-governance-context-system
required_reads:
  spec:
    - spec/README.md
    - spec/tooling-and-quality.md
  docs:
    - docs/context-system/README.md
  decisions:
    - spec/decisions/ADR-0002-locked-subsystem-edit-policy.md
    - spec/decisions/ADR-0003-rust-upstream-authority.md
glossary_terms:
  - public API
  - locked subsystem
  - parity lock
public_contracts:
  - name: package exports
    summary: Root package metadata defines the runtime, type, browser, and bin entrypoints.
  - name: root barrel
    summary: src/index.ts is the supported import surface for library consumers.
invariants:
  - id: api-001
    statement: Consumers import through src/index.ts rather than deep internal paths.
  - id: api-002
    statement: The root barrel may wire host bootstraps, but the public export surface remains intentional and stable.
  - id: api-003
    statement: Build, lint, and test configuration changes stay aligned with the published package contract.
performance_constraints:
  - Exported API and build-surface changes must remain deliberate because they affect downstream consumers and CI behavior.
change_policy:
  default: additive-with-validation
  requires_adr:
    - changing exported package behavior or entrypoints
    - weakening the locked public or build contract
tests:
  - tests/smoke.test.ts
  - tests/browser-global.test.ts
decision_refs:
  - ADR-0002
  - ADR-0003
history_anchors:
  introduced_by: 2026-03-20-ranty-js-repo-split
  major_refactors: []
